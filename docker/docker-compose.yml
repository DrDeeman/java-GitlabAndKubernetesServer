version: '3.9'

services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    hostname: gitlab
    restart: always
    networks:
      minikube_net:
        ipv4_address: 192.168.200.2
    ports:
      - "443:443"
      - "8080:80"
      - "22:22"
      - "5005:5005"
    deploy:
      resources:
        limits:
          memory: 4g
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab


  
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: always
    networks: 
      minikube_net:
        ipv4_address: 192.168.200.3
    volumes:
      - /srv/gitlab-runner/config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock




  db:
    image: postgres:13.3
    container_name: service_postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
     - ./backups/products.sql:/docker-entrypoint-initdb.d/schema1.sql
     - pg_data:/var/lib/postgresql/data
    ports:
     - "5433:5432"
    networks:
     minikube_net:
        ipv4_address: 192.168.200.4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products"]
      interval: 10s
      timeout: 5s
      retries: 5
    tty: true



  pgadmin:
    user: root
    container_name: service_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "stalkerdrdeeman@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "passwd"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pg_admin:/var/lib/pgadmin
    ports:
      - "8081:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      minikube_net:
        ipv4_address: 192.168.200.5
    depends_on:
      db:
        condition: service_healthy


  secman-server:
    image: hashicorp/vault:1.15
    container_name: vault-server
    # ЯВНО указываем запуск сервера, чтобы убить Dev-mode
    command: server 
    depends_on:
      db:
        condition: service_healthy
    networks:
      minikube_net:
        ipv4_address: 192.168.200.6
    environment:
      # ВАЖНО: Используем путь /vault/file, так как он "родной" для образа
      VAULT_LOCAL_CONFIG: |
        {
          "disable_mlock": true,
          "storage": {
            "raft": {
              "path": "/vault/file",
              "node_id": "node1"
            }
          },
          "listener": {
            "tcp": {
              "address": "0.0.0.0:8200",
              "cluster_address": "0.0.0.0:8201",
              "tls_disable": 1
            }
          },
          "cluster_addr": "http://192.168.200.6:8201",
          "api_addr": "http://192.168.200.6:8200",
          "ui": true
        }
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      # Монтируем в /vault/file — этот путь в образе уже имеет нужные права
      - vault_data:/vault/file
    ports:
      - "8088:8200"
      - "8201:8201"
    cap_add:
      - IPC_LOCK

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  pg_data:
  pg_admin:
  vault_data:


networks:
  minikube_net:
    external: true
    name: minikube