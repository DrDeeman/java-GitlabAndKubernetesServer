spring.application.name=demo
server.port=8082
management.server.port=8082
server.servlet.context-path=/test_project

# Включаем отображение Liveness и Readiness проб (важно для Kubernetes)
management.endpoint.health.probes.enabled=true

# Разрешаем доступ к health через HTTP
management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/products
spring.datasource.username=postgress
spring.datasource.password=postgress
spring.jpa.hibernate.ddl-auto=update