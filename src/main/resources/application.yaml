server:
  port: 8082
  servlet:
    context-path: /test_project

management:
  server:
    port: 8082
  endpoint:
    health:
      probes:
        enabled: true # Включаем отображение Liveness и Readiness проб (важно для Kubernetes)
  endpoints:
    web:
      exposure:
        include: health,info # Разрешаем доступ к health через HTTP
 
spring:
  application:
    name: demo

  #profiles:
  #  active: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/products
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
